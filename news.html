<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻中心 - 币安推广官方合作</title>
    <meta name="description" content="币安最新公告、新闻动态">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        binance: {
                            yellow: '#FCD535',
                            dark: '#0B0E11',
                            darker: '#151A21',
                            gray: '#1E2329',
                            light: '#848E9C',
                            white: '#EAECEF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0B0E11 0%, #151A21 50%, #0B0E11 100%);
            min-height: 100vh;
        }
        .gradient-text {
            background: linear-gradient(135deg, #FCD535 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link { position: relative; }
        .nav-link::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
            background: #FCD535; transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
    </style>
</head>
<body class="text-binance-white">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-binance-dark/90 backdrop-blur-md border-b border-binance-gray">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-binance-yellow rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-binance-dark" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-white">币安推广</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link text-binance-light font-medium hover:text-binance-yellow">首页</a>
                    <a href="news.html" class="nav-link text-white font-medium hover:text-binance-yellow">新闻中心</a>
                    <a href="activities.html" class="nav-link text-binance-light font-medium hover:text-binance-yellow">活动动态</a>
                    <a href="commission.html" class="nav-link text-binance-light font-medium hover:text-binance-yellow">返佣说明</a>
                </div>
                <div class="hidden md:block">
                    <a href="#" id="nav-register-btn" class="bg-binance-yellow text-binance-dark px-6 py-2 rounded-lg font-semibold hover:bg-yellow-400">立即注册</a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-binance-darker border-t border-binance-gray">
            <div class="px-4 py-3 space-y-3">
                <a href="index.html" class="block text-binance-light font-medium py-2">首页</a>
                <a href="news.html" class="block text-white font-medium py-2">新闻中心</a>
                <a href="activities.html" class="block text-binance-light font-medium py-2">活动动态</a>
                <a href="commission.html" class="block text-binance-light font-medium py-2">返佣说明</a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-4xl font-bold mb-4"><span class="gradient-text">新闻中心</span></h1>
                <p class="text-binance-light">币安最新公告与动态，实时同步官方信息</p>
            </div>
            
            <div id="news-list">
                <div class="flex items-center justify-center py-12">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-binance-yellow"></div>
                    <span class="ml-3 text-binance-light">加载中...</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-binance-dark border-t border-binance-gray py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-binance-light">
            <p>&copy; 2024 币安推广合作伙伴. 保留所有权利.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/binance-news.js"></script>
</body>
</html>
